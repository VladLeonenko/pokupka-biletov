            if (normalDists[i] > Math.max(paintCorridorPx() * 1.8, med + mad * 4)) {
              farPoints++;
              warn.add(list[i]);
            }
          }
        }
      }

      markAudit(Array.from(issue), 'issue');
      markAudit(Array.from(warn).filter((c) => !issue.has(c)), 'warn');
      const dupCount = Array.from(duplicateKeys.values()).filter((list) => list.length > 1).length;
      const scope = sector ? canonicalSectorLabel(sector) : 'весь SVG';
      showPaintToast(
        issue.size || warn.size ? 'info' : 'ok',
        'Проверка ' +
          scope +
          ': красных ' +
          issue.size +
          ', оранжевых ' +
          warn.size +
          ' · дубли ' +
          dupCount +
          ' · пропуски ' +
          missingNumbers +
          ' · порядок ' +
          jumpRows +
          ' · далеко ' +
          farPoints,
      );
      if (sector) renderRowLabels(sector);
    }

    /** Якоря колонки первых/последних мест; buildSectorProposal использует только marked. */
    function collectColumnAnchors(candidates, rows, edgeKind) {
      const byRow = new Map();
      for (const c of candidates) {
        const row = normalizePaintRowNum(circleRow(c));
        if (!row) continue;
        const seat = circleSeatNum(c);
        if (seat == null) continue;
        const edge = c.getAttribute('data-sector-edge') || '';
        const hit = edgeKind === 'first' ? edge === 'first' : edge === 'last';
        const p = circleXY(c);
        const cur = byRow.get(row);
        if (!cur) {
          byRow.set(row, { rowNum: Number(row), row, c, seat, x: p.x, y: p.y, marked: hit });
          continue;
        }
        if (hit && !cur.marked) {
          byRow.set(row, { rowNum: Number(row), row, c, seat, x: p.x, y: p.y, marked: true });
          continue;
        }
        if (hit === cur.marked) {
          if (edgeKind === 'first' && seat < cur.seat) byRow.set(row, { rowNum: Number(row), row, c, seat, x: p.x, y: p.y, marked: hit || cur.marked });
          if (edgeKind === 'last' && seat > cur.seat) byRow.set(row, { rowNum: Number(row), row, c, seat, x: p.x, y: p.y, marked: hit || cur.marked });
        }
      }
      return Array.from(byRow.values()).sort((a, b) => a.y - b.y);
    }

    function clusterBandsByY(circles, bandGap) {
      const items = circles.map((c) => ({ c, y: circleXY(c).y })).sort((a, b) => a.y - b.y);
      const bands = [];
      let group = [];
      for (const it of items) {
        if (!group.length || it.y - group[group.length - 1].y <= bandGap) group.push(it);
        else {
          bands.push({ circles: group.map((x) => x.c), y: median(group.map((x) => x.y)) });
          group = [it];
        }
      }
      if (group.length) bands.push({ circles: group.map((x) => x.c), y: median(group.map((x) => x.y)) });
      return bands;
    }

    function rowNumFromBandY(bandY, colAnchors, rowMin, rowMax) {
      if (!colAnchors.length) return null;
      if (bandY <= colAnchors[0].y) return colAnchors[0].rowNum;
      if (bandY >= colAnchors[colAnchors.length - 1].y) return colAnchors[colAnchors.length - 1].rowNum;
      for (let i = 1; i < colAnchors.length; i++) {
        const lo = colAnchors[i - 1];
        const hi = colAnchors[i];
        if (bandY >= lo.y && bandY <= hi.y) {
          const t = (bandY - lo.y) / (hi.y - lo.y || 1);
          return Math.round(lo.rowNum + (hi.rowNum - lo.rowNum) * t);
        }
      }
      return null;
    }

    function anchorForRow(anchors, rowNum) {
      const ordered = anchors.slice().sort((a, b) => a.rowNum - b.rowNum);
      const exact = ordered.find((a) => a.rowNum === rowNum);
      if (exact) return exact;
      let lo = null;
      let hi = null;
      for (const anchor of ordered) {
        if (anchor.rowNum < rowNum) lo = anchor;
        if (anchor.rowNum > rowNum) {
          hi = anchor;
          break;
        }
      }
      if (!lo && !hi) return null;
      if (!lo) return hi;
      if (!hi) return lo;
      const t = (rowNum - lo.rowNum) / (hi.rowNum - lo.rowNum || 1);
      return {
        rowNum,
        row: String(rowNum),
        seat: Math.round(lo.seat + (hi.seat - lo.seat) * t),
        x: lo.x + (hi.x - lo.x) * t,
        y: lo.y + (hi.y - lo.y) * t,
        marked: lo.marked || hi.marked,
      };
    }

    function sortSeatsByColumnDirection(circles, firstAnchor, lastAnchor) {
      const dx = lastAnchor.x - firstAnchor.x;
      const dy = lastAnchor.y - firstAnchor.y;
      const len2 = dx * dx + dy * dy || 1;
      return circles
        .slice()
        .sort((a, b) => {
          const pa = circleXY(a);
          const pb = circleXY(b);
          const ta = ((pa.x - firstAnchor.x) * dx + (pa.y - firstAnchor.y) * dy) / len2;
          const tb = ((pb.x - firstAnchor.x) * dx + (pb.y - firstAnchor.y) * dy) / len2;
          return ta - tb;
        });
    }

    function distanceToRowSegment(circle, firstAnchor, lastAnchor) {
      const p = circleXY(circle);
      const dx = lastAnchor.x - firstAnchor.x;
      const dy = lastAnchor.y - firstAnchor.y;
      const len2 = dx * dx + dy * dy || 1;
      const t = ((p.x - firstAnchor.x) * dx + (p.y - firstAnchor.y) * dy) / len2;
      const projX = firstAnchor.x + dx * t;
      const projY = firstAnchor.y + dy * t;
      return { t, dist: Math.hypot(p.x - projX, p.y - projY) };
    }

    function medianRowStep(anchors) {
      const ys = anchors.map((a) => a.y).sort((a, b) => a - b);
      const gaps = [];
      for (let i = 1; i < ys.length; i++) {
        const gap = Math.abs(ys[i] - ys[i - 1]);
        if (gap > 1) gaps.push(gap);
      }
      return median(gaps) || 18;
    }

    function buildSectorProposal(sectorLabel) {
      const candidates = circlesForSector(sectorLabel);
      const rows = groupedLabeledRows(sectorLabel);
      const firstCol = collectColumnAnchors(candidates, rows, 'first').filter((a) => a.marked);
      const lastCol = collectColumnAnchors(candidates, rows, 'last').filter((a) => a.marked);
      if (firstCol.length < 2) {
        throw new Error('Разметь колонку 1-х мест (Тип «1-я колонка») минимум на 2 рядах');
      }
      if (lastCol.length < 2) {
        throw new Error('Разметь колонку последних мест (Тип «посл. колонка») минимум на 2 рядах');
      }
      const manualFirst = normalizePaintRowNum(paintRow?.value ?? '');
      const manualLast = normalizePaintRowNum(paintEndRow?.value ?? '');
      let rowMin = manualFirst ? Number(manualFirst) : firstCol[0].rowNum;
      let rowMax = manualLast ? Number(manualLast) : firstCol[firstCol.length - 1].rowNum;
      if (rowMin > rowMax) [rowMin, rowMax] = [rowMax, rowMin];
      const proposal = [];
      const suspicious = [];
      const warnCircles = [];
      let protectedSkipped = 0;
      let fillable = 0;
      let bandsUsed = 0;
      let bandsSkipped = 0;
      const fillTargets = candidates.filter((c) => {
        if (shouldFillCircle(c)) {
          fillable++;
          return true;
        }
        protectedSkipped++;
        return false;
      });
      if (!fillable) {
        let edgeOnly = 0;
        for (const c of candidates) {
          if (isSectorEdgeAnchor(c)) edgeOnly++;
        }
        throw new Error(
          edgeOnly >= candidates.length
            ? 'Все ' +
              candidates.length +
              ' точек — якоря колонок (1-я/посл.). ↕ заполняет только между ними: нужны точки внутри (красные/облачные или сбрось ряд/место — ⌫ ряд/место)'
            : 'Нет точек для заполнения (' + protectedSkipped + ' якорей колонок). Сбрось ряд/место внутри: ⌫ ряд/место или ▢ область',
        );
      }
      const rowBand = Math.max(7, Math.min(18, medianRowStep(firstCol) * 0.45, paintCorridorPx() * 0.8));
      const used = new Set();
      const rowsTotal = Math.max(0, rowMax - rowMin);
      for (let rowNum = rowMin + 1; rowNum <= rowMax; rowNum++) {
        const rowKey = String(rowNum);
        if (rowNum === rowMin || rowNum === rowMax) {
          bandsSkipped++;
          continue;
        }
        const firstAnchor = anchorForRow(firstCol, rowNum);
        if (!firstAnchor) {
          suspicious.push('ряд ' + rowKey + ': нет якоря 1-го места в колонке');
          bandsSkipped++;
          continue;
        }
        const lastAnchor = anchorForRow(lastCol, rowNum);
        if (!lastAnchor || Math.abs(lastAnchor.x - firstAnchor.x) < 1) {
          suspicious.push('ряд ' + rowKey + ': нет якоря последнего места в колонке');
          bandsSkipped++;
          continue;
        }
        const rowDots = candidates
          .filter((c) => !used.has(c))
          .map((c) => ({ c, meta: distanceToRowSegment(c, firstAnchor, lastAnchor) }))
          .filter((o) => o.meta.t >= -0.08 && o.meta.t <= 1.08 && o.meta.dist <= rowBand)
          .sort((a, b) => a.meta.t - b.meta.t)
          .map((o) => o.c);
        if (!rowDots.length) {
          bandsSkipped++;
          continue;
        }
        const sorted = sortSeatsByColumnDirection(rowDots, firstAnchor, lastAnchor);
        const startSeat = Math.max(1, firstAnchor.seat || 1);
        const existing = rows.get(rowKey) || [];
        const occupiedManual = new Set(
          existing
            .filter(isHardManualSeat)
            .map(circleSeatNum)
            .filter((n) => n != null),
        );
        bandsUsed++;
        for (let i = 0; i < sorted.length; i++) {
          const c = sorted[i];
          used.add(c);
          const seatNum = startSeat + i;
          const edgeKind = c.getAttribute('data-sector-edge') || '';
          const manualLocked = isHardManualSeat(c);
          if (manualLocked) continue;
          if (occupiedManual.has(seatNum)) {
            suspicious.push('ряд ' + rowKey + ' место ' + seatNum + ': занято manual');
            warnCircles.push(c);
            continue;
          }
          if (edgeKind === 'first' && seatNum === circleSeatNum(c)) continue;
          proposal.push({ circle: c, row: rowKey, seat: String(seatNum), edgeKind });
        }
      }

      const proposedRows = new Set(proposal.map((p) => p.row)).size;
      const proposedSeats = proposal.map((p) => Number(p.seat)).filter(Number.isFinite);
      const grid = {
        rowMin,
        rowMax,
        seatMin: proposedSeats.length ? Math.min(...proposedSeats) : 1,
        seatMax: proposedSeats.length ? Math.max(...proposedSeats) : 1,
        edgeRows: firstCol.length,
      };
      if (!proposal.length && protectedSkipped > 0 && protectedSkipped >= candidates.length * 0.85) {
        suspicious.push('почти все точки manual — сектор уже размечен');
      }
      return {
        proposal,
        rows: proposedRows,
        suspicious,
        warnCircles,
        protectedSkipped,
        grid,
        stats: {
          candidates: candidates.length,
          fillable,
          fillTargets: fillTargets.length,
          bands: rowsTotal,
          bandsUsed,
          bandsSkipped,
          edgeRows: firstCol.length,
        },
      };
    }

    async function applyWholeSectorProposal() {
      if (!svgRoot) return;
      clearAuditMarks();
      const sector = paintSectorForApply().trim();
      if (!sector) {
        showPaintToast('err', 'Укажи сектор, например A116');
        return;
      }
      let built;
      try {
        built = buildSectorProposal(sector);
      } catch (e) {
        showPaintToast('err', e.message);
        return;
      }
      if (built.warnCircles?.length) markAudit(built.warnCircles, 'warn');
      if (!built.proposal.length) {
        const hint = built.grid
          ? ' ряды ' + built.grid.rowMin + '–' + built.grid.rowMax + ', места ' + built.grid.seatMin + '–' + built.grid.seatMax
          : '';
        const st = built.stats;
        const statHint = st
          ? ' · в секторе ' +
            st.candidates +
            ', к заполнению ' +
            st.fillable +
            ', полос ' +
            st.bandsUsed +
            '/' +
            st.bands +
            ', опорных рядов ' +
            st.edgeRows
          : '';
        showPaintToast(
          'err',
          built.suspicious.length
            ? '0 предложений' + hint + statHint + '. ' + built.suspicious.slice(0, 2).join(' · ')
            : '0 предложений' + hint + statHint + ' — внутри нет точек для заполнения (контур не считается)',
        );
        renderRowLabels(sector);
        return;
      }
      markAudit(built.proposal.map((p) => p.circle), 'proposed');
      const g = built.grid;
      const gridHint = g ? '\nСетка: ряды ' + g.rowMin + '–' + g.rowMax + ', места ' + g.seatMin + '–' + g.seatMax : '';
      const text =
        'Применить ' +
        canonicalSectorLabel(sector) +
        ': ' +
        built.proposal.length +
        ' мест, ' +
        built.rows +
        ' рядов?' +
        gridHint +
        (built.protectedSkipped ? '\n\nУже размеченные/manual места будут пропущены: ' + built.protectedSkipped : '') +
        (built.suspicious.length ? '\n\nПодозрительно:\n' + built.suspicious.slice(0, 12).join('\n') : '');
      if (!window.confirm(text)) {
        showPaintToast('info', 'Предложение подсвечено бирюзовым, SVG не изменён');
        return;
      }
      const batch = built.proposal.map((p) => ({ el: p.circle, attrs: snapshotCircle(p.circle) }));
      for (const p of built.proposal) {
        applySeatToCircle(p.circle, sector, p.row, p.seat, p.edgeKind ? 'manual-sector-edge' : 'manual-sector-fill');
        if (p.edgeKind) p.circle.setAttribute('data-sector-edge', p.edgeKind);
      }
      pushUndo(batch);
      persistCircleEdits(built.proposal.map((p) => p.circle), { deferServer: true });
      paintUnlabeled(svgRoot);
      recountStats();
      await pushEditsToServer(normalizeSectorLabel(sector));
      validateCurrentSector();
      renderRowLabels(sector);
    }

    async function copySectorMarkup() {
      const fromSector = paintSectorForApply().trim();
      const toSector = paintTargetSector.value.trim();
      if (!fromSector || !toSector) {
        showPaintToast('err', 'Укажи исходный сектор и → сектор');
        return;
      }
      clearAuditMarks();
      const fromRows = groupedLabeledRows(fromSector);
      const target = circlesForSector(toSector);
      if (!fromRows.size || !target.length) {
        showPaintToast('err', 'Нет размеченного исходного сектора или точек цели');
        return;
      }
      const axis = principalAxis(Array.from(fromRows.values()).sort((a, b) => b.length - a.length)[0]);
      const targetRows = new Map();
      const rowNums = Array.from(fromRows.keys()).map(Number).sort((a, b) => a - b);
      const targetSortedByNormal = target
        .map((c) => ({ c, p: normalProjection(c, axis) }))
        .sort((a, b) => a.p - b.p);
      const step = median(rowNums.map((_, i) => (i ? i : 0)).filter(Boolean)) || 1;
      const sourceCount = rowNums.length;
      const chunkSize = Math.max(3, Math.round(target.length / Math.max(1, sourceCount)));
      for (let i = 0; i < sourceCount; i++) {
        targetRows.set(String(rowNums[i]), targetSortedByNormal.slice(i * chunkSize, i === sourceCount - 1 ? targetSortedByNormal.length : (i + 1) * chunkSize).map((o) => o.c));
      }
      const proposal = [];
      for (const row of Array.from(fromRows.keys()).sort((a, b) => Number(a) - Number(b))) {
        const src = fromRows.get(row).slice().sort((c1, c2) => circleSeatNum(c1) - circleSeatNum(c2));
        let dst = (targetRows.get(row) || []).slice().sort((c1, c2) => projection(c1, axis) - projection(c2, axis));
        if (copyReverse.checked) dst.reverse();
        const n = Math.min(src.length, dst.length);
        for (let i = 0; i < n; i++) proposal.push({ circle: dst[i], row, seat: String(circleSeatNum(src[i])) });
      }
      if (!proposal.length) {
        showPaintToast('err', '0 мест для копирования');
        return;
      }
      markAudit(proposal.map((p) => p.circle), 'proposed');
      if (
        !window.confirm(
          'Скопировать ' +
            canonicalSectorLabel(fromSector) +
            ' → ' +
            canonicalSectorLabel(toSector) +
            ': ' +
            proposal.length +
            ' мест? Бирюзовое будет перезаписано.',
        )
      ) {
        showPaintToast('info', 'Копия подсвечена бирюзовым, SVG не изменён');
        return;
      }
      const batch = proposal.map((p) => ({ el: p.circle, attrs: snapshotCircle(p.circle) }));
      for (const p of proposal) applySeatToCircle(p.circle, toSector, p.row, p.seat, 'manual-sector-copy');
      pushUndo(batch);
      persistCircleEdits(proposal.map((p) => p.circle), { deferServer: true });
      paintUnlabeled(svgRoot);
      recountStats();
      await pushEditsToServer(normalizeSectorLabel(toSector));
      validateCurrentSector();
    }

    function updatePaintPreview() {
      clearPaintHighlight();
      const path = paintPathForPreview();
      if (previewLine) previewLine.setAttribute('visibility', 'hidden');
      if (previewPolyline) {
        if (path.length >= 2) {
          previewPolyline.setAttribute('points', path.map((p) => p.x + ',' + p.y).join(' '));
          previewPolyline.setAttribute('visibility', 'visible');
        } else {
          previewPolyline.setAttribute('visibility', 'hidden');
        }
      }
      const corridor = paintCorridorPx();
      const dense = path.length >= 1 ? densifyPaintPath(path, Math.max(4, corridor * 0.35)) : [];
      paintPreviewList = dense.length >= 1 ? pickCirclesAlongPath(dense, corridor, '') : [];
      for (const c of paintPreviewList) {
        if (!paintPreviewMarked.has(c)) {
          c.classList.add('paint-preview');
          paintPreviewMarked.add(c);
        }
      }
    }

    async function clearRowSeatForSelection() {
      clearAuditMarks();
      if (!paintSelection.length) {
        showPaintToast('err', 'Выдели область/точки, потом ⌫ ряд/место');
        return 0;
      }
      const sectors = Array.from(
        new Set(paintSelection.map((c) => normalizeSectorLabel(circleSector(c))).filter(Boolean)),
      );
      const scope =
        sectors.length === 1
          ? canonicalSectorLabel(sectors[0])
          : sectors.length > 1
            ? sectors.length + ' секторов'
            : 'без сектора';
      markAudit(paintSelection, 'proposed');
      if (
        !window.confirm(
          'Очистить ряд/место у ' +
            paintSelection.length +
            ' точек (' +
            scope +
            ')?\\n\\nСектор останется, row/place/data-sector-edge будут удалены.',
        )
      ) {
        showPaintToast('info', 'Очистка отменена');
        return 0;
      }
      const batch = paintSelection.map((c) => ({ el: c, attrs: snapshotCircle(c) }));
      const touched = paintSelection.slice();
      for (const c of touched) clearRowSeatFromCircle(c);
      pushUndo(batch);
      persistCircleEdits(touched, { deferServer: true });
      paintUnlabeled(svgRoot);
      recountStats();
      clearPaintSelection();
      await pushEditsToServer('');
      showPaintToast('ok', 'Очищено ряд/место: ' + touched.length);
      if (selectedCircle && touched.includes(selectedCircle)) renderInfo(readCircleMeta(selectedCircle));
      if (sectors.length === 1) renderRowLabels(sectors[0]);
      return touched.length;
    }

    async function applyColumnAnchorToSelection(selection, sector, edgeKind) {
      const firstRow = Number(normalizePaintRowNum(paintRow.value));
      const lastRow = Number(normalizePaintRowNum(paintEndRow.value));
      if (!Number.isFinite(firstRow) || !Number.isFinite(lastRow)) {
        showPaintToast('err', 'Для колонки укажи «Ряд» и «по»');
        return 0;
      }
      const pathForSort =
        paintPathPoints.length >= 1
          ? paintPathPoints
          : selection.map((c) => ({ x: +c.getAttribute('cx'), y: +c.getAttribute('cy') }));
      const sortedSel = sortCirclesAlongPath(selection, pathForSort);
      const startSeat = Math.max(1, parseInt(paintStartSeat.value, 10) || 1);
      const lastSeatHint = Math.max(startSeat, sortedSel.length);
      const edgeLabel = edgeKind === 'first' ? 'первых мест' : 'последних мест';
      markAudit(sortedSel, 'proposed');
      if (
        !window.confirm(
          'Применить колонку ' +
            edgeLabel +
            ' для ' +
            canonicalSectorLabel(sector) +
            ': ряды ' +
            firstRow +
            '-' +
            lastRow +
            ', ' +
            sortedSel.length +
            ' точек?',
        )
      ) {
        showPaintToast('info', 'Колонка подсвечена бирюзовым, SVG не изменён');
        return 0;
      }
      const batch = sortedSel.map((c) => ({ el: c, attrs: snapshotCircle(c) }));
      const rowSpan = lastRow - firstRow;
      for (let i = 0; i < sortedSel.length; i++) {
        const t = sortedSel.length <= 1 ? 0 : i / (sortedSel.length - 1);
        const row = String(Math.round(firstRow + rowSpan * t));
        const seat =
          edgeKind === 'last'
            ? String(lastSeatHint)
            : String(startSeat);
        applySeatToCircle(sortedSel[i], sector, row, seat, 'manual-sector-edge');
        sortedSel[i].setAttribute('data-sector-edge', edgeKind);
      }
      pushUndo(batch);
      persistCircleEdits(sortedSel, { deferServer: true });
      paintUnlabeled(svgRoot);
      recountStats();
      await pushEditsToServer(normalizeSectorLabel(sector));
      showPaintToast('ok', 'Колонка ' + edgeLabel + ' применена: ' + sortedSel.length + ' точек');
      renderRowLabels(sector);
      return sortedSel.length;
    }

    async function applyPaintToSelection() {
      clearAuditMarks();
      if (!paintSelection.length) {
        showPaintToast('err', 'Протяни линию вдоль ряда или Shift+клик по точкам');
        return 0;
      }
      const row = getEffectivePaintRow();
      if (!isValidPaintRow(row)) {
        showPaintToast('err', 'Введи номер ряда и нажми «Применить ряд»');
        return 0;
      }
      const startSeat = Math.max(1, parseInt(paintStartSeat.value, 10) || 1);
      const fieldSector = paintSectorForApply();
      let sector;
      if (fieldSector) {
        sector = fieldSector;
      } else {
        sector = inferSectorFromSelection(paintSelection);
        if (!sector) {
          showPaintToast('err', 'Укажи сектор в поле или выдели места одного сектора');
          return 0;
        }
        paintSector.value = normalizeSectorLabel(sector);
      }
      let selection = paintSelection;
      const { list: inBbox, dropped: bboxDrop } = filterCirclesToSectorBbox(selection, sector);
      if (bboxDrop > 0) {
        showPaintToast(
          'info',
          'Вне полигона «' +
            canonicalSectorLabel(sector) +
            '»: −' +
            bboxDrop +
            ' (линия зацепила чужой сектор)',
        );
      }
      selection = inBbox;
      if (!selection.length) {
        showPaintToast(
          'err',
          'Нет точек внутри «' +
            canonicalSectorLabel(sector) +
            '». Веди линию по ряду в этом секторе.',
        );
        return 0;
      }
      const applyMode = paintApplyMode?.value || 'row';
      if (applyMode === 'first-col' || applyMode === 'last-col') {
        return applyColumnAnchorToSelection(selection, sector, applyMode === 'first-col' ? 'first' : 'last');
      }
      const wantRow = normalizePaintRowNum(row);
      const cloudRowMismatch = selection.filter(
        (c) => normalizePaintRowNum(circleRow(c)) && normalizePaintRowNum(circleRow(c)) !== wantRow,
      ).length;
      if (cloudRowMismatch > selection.length * 0.2) {
        showPaintToast(
          'info',
          '⚠ В выделении есть точки с другим row в облаке (' +
            cloudRowMismatch +
            '). Проверь линию; места из place/data-seat сохраним как есть.',
        );
      }
      const pathForSort =
        paintPathPoints.length >= 1
          ? paintPathPoints
          : selection.map((c) => ({ x: +c.getAttribute('cx'), y: +c.getAttribute('cy') }));
      const sortedSel = sortCirclesAlongPath(selection, pathForSort);
      const endSeat = startSeat + sortedSel.length - 1;
      markAudit(sortedSel, 'proposed');
      if (
        !window.confirm(
          'Похоже, это ' +
            canonicalSectorLabel(sector) +
            ', ряд ' +
            row +
            ', места ' +
            startSeat +
            '-' +
            endSeat +
            ' (' +
            sortedSel.length +
            ' точек). Применить?',
        )
      ) {
        showPaintToast('info', 'Ряд подсвечен бирюзовым, SVG не изменён');
        return 0;
      }
      const batch = sortedSel.map((c) => ({ el: c, attrs: snapshotCircle(c) }));
      const forceRenumber = paintRenumber.checked;
      let nextAuto = startSeat;
      let preserved = 0;
      for (const c of sortedSel) {
        const existing = circleSeatNum(c);
        const seat =
          forceRenumber || existing == null ? String(nextAuto) : String(existing);
        if (!forceRenumber && existing != null) preserved++;
        applySeatToCircle(c, sector, row, seat, 'manual-row');
        nextAuto += 1;
      }
      pushUndo(batch);
      persistCircleEdits(sortedSel, { deferServer: true });
      paintUnlabeled(svgRoot);
      recountStats();
      const seatHint = forceRenumber
        ? ' · места ' + startSeat + '…' + (nextAuto - 1)
        : preserved > 0
          ? ' · номера из облака: ' + preserved
          : ' · места с «Место с»=' + startSeat;
      const appliedNorm = normalizeSectorLabel(sector);
      showPaintToast(
        'info',
        canonicalSectorLabel(sector) + ' ряд ' + row + ': ' + sortedSel.length + ' мест' + seatHint + ' → сервер…',
      );
      await pushEditsToServer(appliedNorm);
      renderRowLabels(sector);
      return paintSelection.length;
    }

    function selectPaintRowFromFields() {
      if (!svgRoot) return;
      const sector = paintSectorForApply().trim();
      const row = getEffectivePaintRow();
      if (!sector || !isValidPaintRow(row)) {
        showPaintToast('err', 'Укажи сектор и ряд, затем ⊙ ряд');
        return;
      }
      const wantRow = normalizePaintRowNum(row);
      clearPaintSelection();
      const hits = [];
      for (const c of svgRoot.querySelectorAll('circle')) {
        const s = circleSector(c);
        const r = normalizePaintRowNum(circleRow(c));
        if (!s || !r) continue;
        if (r !== wantRow) continue;
        if (!sectorNormsMatch(s, sector)) continue;
        hits.push(c);
      }
      if (!hits.length) {
        showPaintToast(
          'info',
          'Нет точек с data-row=' +
            row +
            ' в «' +
            canonicalSectorLabel(sector) +
            '». Протяни линию по ряду (〰), «Место с»=' +
            (paintStartSeat.value || '1') +
            ' → ▶',
        );
        return;
      }
      for (const c of hits) togglePaintCircle(c, true);
      showPaintToast('ok', '⊙ ' + hits.length + ' точек · «с Место с» + ▶ перенумеровать');
    }

    function cancelPaintDrag() {
      paintDrag = false;
      dragPan = false;
      paintPending = null;
      rectSelectPending = null;
      paintPathPoints = [];
      paintCursor = null;
      paintPreviewList = [];
      clearPaintHighlight();
      hidePaintLine();
      hideRectSelect();
      viewport.classList.remove('dragging');
      try { viewport.releasePointerCapture(paintCaptureId); } catch (_) { /* noop */ }
      paintCaptureId = -1;
    }

    function releasePaintPointer() {
      try { viewport.releasePointerCapture(paintCaptureId); } catch (_) { /* noop */ }
      paintCaptureId = -1;
    }

    function endRectSelectPointer(e) {
      if (!rectSelectPending) return;
      const pending = rectSelectPending;
      releasePaintPointer();
      hideRectSelect();
      const current = pending.current;
      const moved = Math.hypot(e.clientX - pending.clientX, e.clientY - pending.clientY);
      rectSelectPending = null;
      paintSuppressClick = true;
      if (moved < 4) {
        showPaintToast('info', 'Рамка слишком маленькая');
        return;
      }
      const fieldSec = paintSectorForApply();
      const list = circlesInSvgRect(pending.start, current, fieldSec);
      if (list.length) {
        if (pending.additive) mergePaintSelection(list);
        else setPaintSelection(list);
        showPaintToast(
          'ok',
          '▢ выделено ' +
            list.length +
            ' точек' +
            (fieldSec ? ' · ' + canonicalSectorLabel(fieldSec) : '') +
            ' → ⌫ ряд/место',
        );
      } else {
        showPaintToast('err', '0 точек в рамке' + (fieldSec ? ' для ' + canonicalSectorLabel(fieldSec) : ''));
      }
      refreshStatusHint();
    }

    function endPaintPointer(e) {
      if (!paintPending) return;
      const additive = paintPending.additive || e.shiftKey || e.metaKey;
      hidePaintLine();
      clearPaintHighlight();
      releasePaintPointer();

      if (paintDrag && paintCursor) {
        appendPaintPathPoint(paintCursor.x, paintCursor.y);
      }

      if (paintDrag && paintPathPoints.length >= 1) {
        const corridor = paintCorridorPx();
        const dense = densifyPaintPath(paintPathPoints, corridor * 0.4);
        let list = pickCirclesAlongPath(dense, corridor, '');
        const fieldSec = paintSectorForApply();
        if (fieldSec && list.length) {
          const { list: trimmed, dropped } = filterCirclesToSectorBbox(list, fieldSec);
          list = trimmed;
          if (dropped > 0 && !list.length) {
            showPaintToast('err', 'Линия вне «' + canonicalSectorLabel(fieldSec) + '» — веди по нужному сектору');
          }
        }
        if (list.length) {
          if (additive) mergePaintSelection(list);
          else setPaintSelection(list);
          const hintSec = fieldSec
            ? canonicalSectorLabel(fieldSec) + ' (из поля при ▶)'
            : inferSectorFromSelection(list);
          showPaintToast(
            'info',
            'На линии ' +
              list.length +
              ' мест' +
              (hintSec ? ' · ' + hintSec : '') +
              ' → ряд → ▶',
          );
        } else {
          showPaintToast('err', '0 мест — увеличь «Коридор» или веди по центру ряда');
        }
        paintSuppressClick = true;
      } else if (!paintDrag) {
        const c = circleAtClient(paintPending.clientX, paintPending.clientY);
        if (c) {
          togglePaintCircle(c, additive);
          paintSuppressClick = true;
        }
      }

      paintDrag = false;
      paintPending = null;
      paintPathPoints = [];
      paintCursor = null;
      refreshStatusHint();
    }

    function schedulePaintPreview() {
      if (paintPreviewRaf) return;
      paintPreviewRaf = requestAnimationFrame(() => {
        paintPreviewRaf = 0;
        if (!paintPending) return;
        updatePaintPreview();
        status.textContent = '〰 ' + paintPreviewList.length + ' на линии · отпусти → ряд → ▶';
      });
    }

    async function downloadSvg() {
      if (!svgRoot) return;
      flushEditsToDomBeforeSave();
      const xml = serializeCurrentSvgXml();
      const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const base = getSvgFileName().replace(/\.svg$/i, '');
      a.download = base + '-edited.svg';
      a.click();
      URL.revokeObjectURL(a.href);
      const result = await saveSvgToServer();
      if (result.ok) showPaintToast('ok', 'SVG на диске + скачан');
      else showPaintToast('info', 'Скачан файл; для записи на диск — запусти backend');
    }

    function attachInteraction(svg) {
      svgRoot = svg;
      overlayG = null;
      previewLine = null;
      rectSelectEl = null;
      previewPolyline = null;
      rowLabelG = null;
      undoStack.length = 0;
      undoBtn.disabled = true;
      const vb = svg.viewBox.baseVal;
      if (vb && vb.width) {
        vbW = vb.width;
        vbH = vb.height;
      }
      syncStageSize();
      const embedded = svg.querySelector('script');
      if (embedded) embedded.remove();
      allCircles = Array.from(svg.querySelectorAll('circle'));
      rebuildSectorBboxCache();
      rebuildCircleCoordIndex();
      circleGrid = buildCircleGrid(allCircles, 96);
      ensureOverlay();
      const restored = applyStoredEditsToSvg();
      refreshAllEditorVisuals();
      recountStats();
      paintUnlabeled(svg);
      updateSaveStatus();
      if (restored > 0) {
        showPaintToast('info', 'Подгружено ' + restored + ' правок из браузера');
      }
      fitToView();
      renderRowLabels(paintSectorForApply());

      svg.addEventListener('click', (e) => {
        if (didDrag || paintSuppressClick) {
          paintSuppressClick = false;
          return;
        }
        const t = circleAtClient(e.clientX, e.clientY);
        if (!t) return;
        e.stopPropagation();
        if (appMode === 'paint') return;
        selectCircle(t);
      });

      viewport.addEventListener('click', (e) => {
        if (didDrag || appMode === 'paint') return;
        if (e.target === viewport || e.target === stage || e.target === svgRoot) clearSelection();
      });
    }

    function loadSvgText(text) {
      stage.innerHTML = text;
      const svg = stage.querySelector('svg');
      if (!svg) {
        status.textContent = 'В файле нет <svg>';
        return;
      }
      attachInteraction(svg);
    }

    viewport.addEventListener(
      'pointerdown',
      (e) => {
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (activePointers.size === 2) {
        cancelPaintDrag();
        touchPinch = null;
        dragPan = false;
        viewport.classList.remove('dragging');
        pinchStart = null;
        updatePinchZoom();
        e.preventDefault();
        return;
      }

      if (e.button !== 0) return;

      if (appMode === 'paint' && svgRoot) {
        if (spacePan) {
          dragPan = true;
          didDrag = false;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          panStartX = panX;
          panStartY = panY;
          viewport.classList.add('dragging');
          e.preventDefault();
          return;
        }
        const p = clientToSvg(e.clientX, e.clientY);
        if (!p) {
          e.preventDefault();
          return;
        }
        if (rectSelectMode) {
          dragPan = false;
          viewport.classList.remove('dragging');
          rectSelectPending = {
            start: p,
            current: p,
            additive: e.shiftKey || e.metaKey,
            clientX: e.clientX,
            clientY: e.clientY,
          };
          paintDrag = false;
          didDrag = false;
          infoPanel.classList.remove('visible');
          showRectSelect(p, p);
          if (viewport.setPointerCapture) {
            try {
              viewport.setPointerCapture(e.pointerId);
              paintCaptureId = e.pointerId;
            } catch (_) {
              /* noop */
            }
          }
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        dragPan = false;
        viewport.classList.remove('dragging');
        paintPathPoints = [{ x: p.x, y: p.y }];
        paintCursor = { x: p.x, y: p.y };
        paintPending = {
          clientX: e.clientX,
          clientY: e.clientY,
          additive: e.shiftKey || e.metaKey,
        };
        paintDrag = false;
        didDrag = false;
        infoPanel.classList.remove('visible');
        e.preventDefault();
        e.stopPropagation();
        return;
      }

      if (appMode === 'paint') {
        e.preventDefault();
        return;
      }

      if (!isPanActive()) return;
      dragPan = true;
      didDrag = false;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      panStartX = panX;
      panStartY = panY;
      viewport.classList.add('dragging');
    },
      true,
    );

    viewport.addEventListener('pointermove', (e) => {
      if (activePointers.has(e.pointerId)) {
        activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      }
      if (activePointers.size === 2 && updatePinchZoom()) {
        e.preventDefault();
        return;
      }

      if (rectSelectPending) {
        e.preventDefault();
        const p = clientToSvg(e.clientX, e.clientY);
        if (p) {
          rectSelectPending.current = p;
          showRectSelect(rectSelectPending.start, p);
          const count = circlesInSvgRect(rectSelectPending.start, p, paintSectorForApply()).length;
          status.textContent = '▢ ' + count + ' в рамке · отпусти → выделить';
        }
        return;
      }

      if (paintPending) {
        e.preventDefault();
        const moved = Math.hypot(e.clientX - paintPending.clientX, e.clientY - paintPending.clientY);
        if (!paintDrag && moved > 4) {
          paintDrag = true;
          didDrag = true;
          dragPan = false;
          viewport.classList.remove('dragging');
          if (!paintPending.additive) clearPaintSelection();
          if (viewport.setPointerCapture) {
            try {
              viewport.setPointerCapture(e.pointerId);
              paintCaptureId = e.pointerId;
            } catch (_) {
              /* noop */
            }
          }
        }
        if (paintDrag) {
          const p = clientToSvg(e.clientX, e.clientY);
          if (p) {
            paintCursor = { x: p.x, y: p.y };
            appendPaintPathPoint(p.x, p.y);
            schedulePaintPreview();
          }
        }
        return;
      }
      if (appMode === 'paint') return;
      if (!dragPan) return;
      if (Math.abs(e.clientX - dragStartX) > 3 || Math.abs(e.clientY - dragStartY) > 3) didDrag = true;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      clampPanToViewport();
      applyTransform();
    });

    viewport.addEventListener(
      'wheel',
      (e) => {
        e.preventDefault();
        if (paintPending) return;
        const factor = e.deltaY < 0 ? 1.14 : 1 / 1.14;
        setZoomAt(clampZoom(zoom * factor), e.clientX, e.clientY);
      },
      { passive: false },
    );

    function releaseTrackedPointer(e) {
      activePointers.delete(e.pointerId);
      if (activePointers.size < 2) pinchStart = null;
    }

    viewport.addEventListener('pointerup', (e) => {
      releaseTrackedPointer(e);
      if (rectSelectPending) {
        endRectSelectPointer(e);
        return;
      }
      if (paintPending) {
        endPaintPointer(e);
        return;
      }
      if (!dragPan) return;
      dragPan = false;
      viewport.classList.remove('dragging');
    });

    window.addEventListener('pointerup', (e) => {
      releaseTrackedPointer(e);
      if (paintPending) endPaintPointer(e);
    });

    viewport.addEventListener('pointercancel', (e) => {
      releaseTrackedPointer(e);
      if (paintPending) cancelPaintDrag();
      dragPan = false;
      viewport.classList.remove('dragging');
    });

    viewport.addEventListener(
      'touchstart',
      (e) => {
        if (e.touches.length === 2) {
          cancelPaintDrag();
          dragPan = false;
          viewport.classList.remove('dragging');
          const dist = touchDistance(e.touches);
          const { x, y } = touchCenter(e.touches);
          touchPinch = { dist, zoom0: zoom, cx: x, cy: y };
          e.preventDefault();
        }
      },
      { passive: false },
    );

    viewport.addEventListener(
      'touchmove',
      (e) => {
        if (e.touches.length === 2 && touchPinch) {
          const dist = touchDistance(e.touches);
          const { x, y } = touchCenter(e.touches);
          if (touchPinch.dist < 8) {
            touchPinch = { dist, zoom0: zoom, cx: x, cy: y };
          } else {
            applyPinchZoom(dist, x, y, touchPinch);
          }
          e.preventDefault();
        }
      },
      { passive: false },
    );

    viewport.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) touchPinch = null;
    });
    viewport.addEventListener('touchcancel', () => {
      touchPinch = null;
    });

    if (zoomSlider) {
      zoomSlider.addEventListener('input', () => {
        if (syncingZoomSlider) return;
        const r = viewport.getBoundingClientRect();
        setZoomAt(sliderValueToZoom(zoomSlider.value), r.left + r.width / 2, r.top + r.height / 2);
      });
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !e.repeat) {
        spacePan = true;
        updatePanCursor();
        e.preventDefault();
      }
      if (e.code === 'Escape') {
        if (rectSelectPending || paintPending) cancelPaintDrag();
        else if (paintSelection.length) clearPaintSelection();
        else clearSelection();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        undo();
      }
      if (e.key === '+' || e.key === '=') zoomCenter(1.15);
      if (e.key === '-') zoomCenter(1 / 1.15);
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        spacePan = false;
        updatePanCursor();
      }
    });

    panModeBtn.addEventListener('click', () => {
      panMode = !panMode;
      panModeBtn.classList.toggle('active', panMode);
      updatePanCursor();
    });

    modeViewBtn.addEventListener('click', () => setAppMode('view'));
    modeEditBtn.addEventListener('click', () => setAppMode('edit'));
    modePaintBtn.addEventListener('click', () => setAppMode('paint'));
    function syncPaintApplyModeUi() {
      const mode = paintApplyMode?.value || 'row';
      const isColumn = mode === 'first-col' || mode === 'last-col';
      if (paintEndRowWrap) paintEndRowWrap.hidden = !isColumn;
      if (paintRowWrap) {
        const label = paintRowWrap.firstChild;
        if (label && label.nodeType === Node.TEXT_NODE) {
          label.textContent = isColumn ? 'ряд с ' : 'Ряд ';
        }
      }
      if (paintRow) paintRow.placeholder = isColumn ? 'первый ряд' : '№ ряда';
    }

    paintApplyMode?.addEventListener('change', syncPaintApplyModeUi);
    syncPaintApplyModeUi();

    paintRow.addEventListener('input', () => {
      if (isValidPaintRow(paintRow.value)) paintRow.dataset.fallback = paintRow.value.trim();
    });
    paintSector.addEventListener('input', () => renderRowLabels(paintSectorForApply()));
    paintClearSel.addEventListener('click', () => {
      clearPaintSelection();
      showPaintToast('info', 'Выделение сброшено');
    });
    rectSelectBtn.addEventListener('click', () => setRectSelectMode(!rectSelectMode));
    paintSelectRow.addEventListener('click', () => selectPaintRowFromFields());
    clearRowSeatBtn.addEventListener('click', () => clearRowSeatForSelection());
    paintApply.addEventListener('click', () => applyPaintToSelection());
    sectorApply.addEventListener('click', () => applyWholeSectorProposal());
    auditBtn.addEventListener('click', () => validateCurrentSector());
    copySectorBtn.addEventListener('click', () => copySectorMarkup());

    zoomInBtn.addEventListener('click', () => {
      const r = viewport.getBoundingClientRect();
      zoomCenter(isCoarsePointer() ? 1.72 : 1.25, r.left + r.width / 2, r.top + r.height / 2);
    });
    zoomOutBtn.addEventListener('click', () => {
      const r = viewport.getBoundingClientRect();
      zoomCenter(isCoarsePointer() ? 1 / 1.45 : 1 / 1.25, r.left + r.width / 2, r.top + r.height / 2);
    });
    zoomFitBtn.addEventListener('click', () => { if (svgRoot) fitToView(); });
    undoBtn.addEventListener('click', undo);
    saveSvgBtn.addEventListener('click', downloadSvg);

    fileInput.addEventListener('change', () => {
      const f = fileInput.files?.[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => loadSvgText(r.result);
      r.readAsText(f);
    });
    markUnlabeled.addEventListener('change', () => { if (svgRoot) paintUnlabeled(svgRoot); });

    window.addEventListener('resize', () => { if (svgRoot) fitToView(); });

    const defaultSvg = urlParams.get('svg') || 'luzhniki-gray-cloud-enriched.svg';
    const svgUrl = (svgFetchBase ? svgFetchBase + '/tools/' : '/tools/') + defaultSvg;
    status.textContent = 'Загрузка ' + svgUrl + '…';
    refreshServerBundleStatus();
    fetch(svgUrl + '?_=' + Date.now(), { cache: 'no-store' })
      .then((r) => {
        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(loadSvgText)
      .catch((err) => {
        status.textContent = 'Не удалось загрузить /tools/' + defaultSvg + ' — выбери файл (' + err.message + ')';
      });
  </script>
</body>
</html>
