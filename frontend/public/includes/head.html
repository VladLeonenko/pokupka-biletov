    <style>
        /* Скрываем телефон в header */
        .header__phone,
        .header a[href^="tel:"],
        .header > a[href^="tel:"],
        header a[href^="tel:"],
        .header a:not([href="/"]):not([href^="/"]):not([href^="http"]):not([href^="mailto:"]) {
            display: none !important;
        }
        
        /* Переопределяем стили header для иконок */
        .header .ecommerce-icons-container-global,
        header .ecommerce-icons-container-global {
            display: flex !important;
            align-items: center !important;
            gap: 4px !important;
            margin-left: auto !important;
            margin-right: 0 !important;
            z-index: 100 !important;
            position: relative !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .header .ecommerce-icons-container-global a,
        header .ecommerce-icons-container-global a {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 40px !important;
            height: 40px !important;
            color: inherit !important;
            text-decoration: none !important;
            transition: opacity 0.2s !important;
            visibility: visible !important;
            opacity: 1 !important;
            font-size: inherit !important;
        }
        
        .header .ecommerce-icons-container-global a:hover,
        header .ecommerce-icons-container-global a:hover {
            opacity: 0.7 !important;
        }
        
        .header .ecommerce-icons-container-global svg,
        header .ecommerce-icons-container-global svg {
            width: 24px !important;
            height: 24px !important;
            display: block !important;
            fill: currentColor !important;
        }
        
        @media (max-width: 768px) {
            .header .ecommerce-icons-container-global,
            header .ecommerce-icons-container-global {
                gap: 2px !important;
            }
            
            .header .ecommerce-icons-container-global a,
            header .ecommerce-icons-container-global a {
                width: 36px !important;
                height: 36px !important;
            }
            
            .header .ecommerce-icons-container-global svg,
            header .ecommerce-icons-container-global svg {
                width: 20px !important;
                height: 20px !important;
            }
        }
    </style>
	
	<!-- Form Handler for CMS -->
	<script type="text/javascript">
		// Set API base URL from environment variable or auto-detect
		// You can override this by setting window.API_BASE before this script runs
		window.API_BASE = window.API_BASE || (function() {
			// Check if API_BASE is set via meta tag or environment
			const metaApiBase = document.querySelector('meta[name="api-base"]');
			if (metaApiBase && metaApiBase.content) {
				return metaApiBase.content;
			}
			// Auto-detect: use relative paths (proxied through Vite in dev, same origin in prod)
			const hostname = window.location.hostname;
			if (hostname === 'localhost' || hostname === '127.0.0.1') {
				return '';
			}
			return '';
		})();
	</script>
	<script type="text/javascript" src="/legacy/js/form-handler.js"></script>
