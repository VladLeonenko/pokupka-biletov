# Стадия 1: только HTTP:80 — до certbot (без SSL, без редиректа на https).
# Путь к проекту: /var/pokupka-biletov
#
#   sudo cp configs/nginx-biletvsem.http-only.conf /etc/nginx/sites-available/biletvsem.com
#   sudo ln -sf /etc/nginx/sites-available/biletvsem.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d biletvsem.com -d www.biletvsem.com
# После certbot при желании замени на configs/nginx-biletvsem.com.conf (пути /var/pokupka-biletov).

upstream biletvsem_node {
    keepalive 32;
    server 127.0.0.1:3000;
    keepalive_requests 100;
}

server {
    listen 80;
    listen [::]:80;
    server_name biletvsem.com www.biletvsem.com;

    access_log /var/log/nginx/biletvsem_access.log;
    error_log  /var/log/nginx/biletvsem_error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript
               image/svg+xml application/xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 32m;

    location /api/ {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /sitemap.xml {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /feed/services.yml {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/(llms\.txt|llms-full\.txt)$ {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /.well-known/llms.txt {
        proxy_pass http://biletvsem_node;
    }

    location /assets/ {
        root /var/pokupka-biletov/frontend/dist;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /robots.txt {
        alias /var/pokupka-biletov/frontend/dist/robots.txt;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }
    location = /manifest.json {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Type "application/manifest+json";
    }
    location = /favicon.svg {
        alias /var/pokupka-biletov/frontend/dist/favicon.svg;
        add_header Cache-Control "public, max-age=86400";
    }
    location = /loading.gif {
        alias /var/pokupka-biletov/frontend/dist/loading.gif;
        add_header Content-Type "image/gif";
        add_header Cache-Control "public, max-age=86400";
    }

    location /uploads/ {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
