# HTTP блок - редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name prime-coder.ru www.prime-coder.ru;
    return 301 https://prime-coder.ru$request_uri;
}

# www → non-www redirect (SEO: один каноничный домен)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.prime-coder.ru;
    ssl_certificate /etc/letsencrypt/live/prime-coder.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prime-coder.ru/privkey.pem;
    return 301 https://prime-coder.ru$request_uri;
}

# HTTPS блок - основной контент
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prime-coder.ru;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/prime-coder.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prime-coder.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Логи
    access_log /var/log/nginx/prime-coder_access.log;
    error_log /var/log/nginx/prime-coder_error.log;

    # Gzip сжатие (SEO: Core Web Vitals / LCP)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json
               image/svg+xml application/xml font/woff2;

    # Security headers + HSTS (важно для индексации: явно указывает протокол HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 🔥 СТАТИКА (CSS, JS, изображения) - отдаёт Nginx напрямую
    # НО НЕ /uploads/ (они через backend)
    location ~* ^(?!/uploads/).*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Assets (Vite сборка)
    location /assets/ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Legacy статика
    location /legacy/ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Долгий запрос пайплайна (аудит + рассылка) — таймаут 10 мин
    location = /api/sales-pipeline/process-daily {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API проксирование
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # Загрузки (uploads)
    # Uploads - проксируем на backend (где работает express.static)
    location /uploads/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Кеширование для ускорения
        proxy_cache_valid 200 1d;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap (обязательно 200 OK для вебмастеров)
    location = /sitemap.xml {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    # YML-фид услуг для Яндекс.Вебмастер (Исполнители)
    location = /feed/services.yml {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    # llms.txt, llms-full.txt — «sitemap для ИИ» (Perplexity, GPTBot и др.)
    location ~ ^/(llms\.txt|llms-full\.txt)$ {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
    }

    # .well-known/llms.txt — редирект для краулеров
    location = /.well-known/llms.txt {
        return 302 https://prime-coder.ru/llms.txt;
    }

    # Robots.txt
    location = /robots.txt {
        root /var/www/primecoder-gulp/frontend/dist;
        try_files $uri =404;
    }

    # Manifest и Service Worker
    location ~ ^/(manifest\.json|sw\.js)$ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 🔥 ВСЁ ОСТАЛЬНОЕ (HTML) → Backend для SSR
    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
