# HTTP блок - редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name prime-coder.ru www.prime-coder.ru;
    
    # Редирект на HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS блок - основной контент
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prime-coder.ru www.prime-coder.ru;

    # SSL сертификаты
    ssl_certificate /etc/letsencrypt/live/prime-coder.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prime-coder.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Логи
    access_log /var/log/nginx/prime-coder_access.log;
    error_log /var/log/nginx/prime-coder_error.log;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    # 🔥 СТАТИКА (CSS, JS, изображения) - отдаёт Nginx напрямую
    # НО НЕ /uploads/ (они через backend)
    location ~* ^(?!/uploads/).*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Assets (Vite сборка)
    location /assets/ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Legacy статика
    location /legacy/ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API проксирование
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # Загрузки (uploads)
    # Uploads - проксируем на backend (где работает express.static)
    location /uploads/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Кеширование для ускорения
        proxy_cache_valid 200 1d;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
    }

    # Robots.txt
    location = /robots.txt {
        root /var/www/primecoder-gulp/frontend/dist;
        try_files $uri =404;
    }

    # Manifest и Service Worker
    location ~ ^/(manifest\.json|sw\.js)$ {
        root /var/www/primecoder-gulp/frontend/dist;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 🔥 ВСЁ ОСТАЛЬНОЕ (HTML) → Backend для SSR
    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
