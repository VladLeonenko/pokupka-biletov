# Nginx: biletvsem.com + Node (PM2) на 127.0.0.1:3000
# Путь к репо в alias — /var/www/pokupka-biletov/... (если /var/www нет: sudo bash scripts/ensure-var-www.sh)
# Подставь свой путь к репо, если клон не в /var/www/pokupka-biletov
#
#   sudo install -m 644 configs/nginx-biletvsem.com.conf /etc/nginx/sites-available/biletvsem.com
#   sudo ln -sf /etc/nginx/sites-available/biletvsem.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сначала certbot (ниже в scripts/server-init-biletvsem.sh) — до сертификатов
# раскомментируй временный server { listen 80 } только с proxy_pass.

upstream biletvsem_node {
    keepalive 32;
    server 127.0.0.1:3000;
    keepalive_requests 100;
}

# HTTP: редирект на HTTPS (после получения certbot; до того — смотри комментарий внизу)
server {
    listen 80;
    listen [::]:80;
    server_name biletvsem.com www.biletvsem.com;
    return 301 https://biletvsem.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.biletvsem.com;
    ssl_certificate     /etc/letsencrypt/live/biletvsem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biletvsem.com/privkey.pem;
    return 301 https://biletvsem.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name biletvsem.com;

    ssl_certificate     /etc/letsencrypt/live/biletvsem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biletvsem.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/biletvsem_access.log;
    error_log  /var/log/nginx/biletvsem_error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript
               image/svg+xml application/xml;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 32m;

    # Долгие запросы GetBilet / live-каталог
    location /api/ {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # XML / фиды — только backend (не отдавать index.html)
    location = /sitemap.xml {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /feed/services.yml {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/(llms\.txt|llms-full\.txt)$ {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /.well-known/llms.txt {
        proxy_pass http://biletvsem_node;
    }

    # Статика Vite: отдаёт Nginx (меньше нагрузки на Node) — путь = frontend/dist
    location /assets/ {
        alias /var/www/pokupka-biletov/frontend/dist/assets/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # robots.txt / manifest / sw (файлы лежат в dist)
    location = /robots.txt {
        alias /var/www/pokupka-biletov/frontend/dist/robots.txt;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }
    location = /manifest.json {
        alias /var/www/pokupka-biletov/frontend/dist/manifest.json;
        add_header Content-Type "application/manifest+json";
    }
    location = /favicon.svg {
        alias /var/www/pokupka-biletov/frontend/dist/favicon.svg;
        add_header Cache-Control "public, max-age=86400";
    }

    # Legacy: при необходимости снимите комментарий, если Nginx отдаёт статику без Node
    # location /legacy/ {
    #     alias /var/www/pokupka-biletov/frontend/dist/legacy/;
    #     add_header Cache-Control "public, max-age=31536000, immutable";
    # }

    location /uploads/ {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

