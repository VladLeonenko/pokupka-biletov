# =============================================================================
# Полный конфиг Nginx: biletvsem.com + Node (PM2) 127.0.0.1:3000
# Проект: /var/pokupka-biletov  →  frontend/dist
#
# Порядок первого запуска:
#   1) Установи nginx + certbot: apt install -y nginx certbot python3-certbot-nginx
#   2) Вытяни сертификат (любой из вариантов):
#        sudo certbot certonly --webroot -w /var/www/certbot -d biletvsem.com -d www.biletvsem.com
#        # или: sudo certbot --nginx -d biletvsem.com -d www.biletvsem.com
#   3) Если нет /etc/letsencrypt/ssl-dhparams.pem:
#        sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
#   4) sudo mkdir -p /var/www/certbot
#   5) sudo cp configs/nginx-biletvsem.com.conf /etc/nginx/sites-available/biletvsem.com
#   6) sudo ln -sf /etc/nginx/sites-available/biletvsem.com /etc/nginx/sites-enabled/
#   7) sudo rm -f /etc/nginx/sites-enabled/default
#   8) sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream biletvsem_node {
    keepalive 32;
    server 127.0.0.1:3000;
    keepalive_requests 100;
}

# HTTP — ACME (Let’s Encrypt) + редирект на канон (HTTPS, без www)
server {
    listen 80;
    listen [::]:80;
    server_name biletvsem.com www.biletvsem.com;

    # Не редиректим challenge, иначе certbot / renewal сломаются
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://biletvsem.com$request_uri;
    }
}

# HTTPS www — только редирект на канон
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.biletvsem.com;

    ssl_certificate     /etc/letsencrypt/live/biletvsem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biletvsem.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://biletvsem.com$request_uri;
}

# HTTPS — основной сайт
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name biletvsem.com;

    ssl_certificate     /etc/letsencrypt/live/biletvsem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biletvsem.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/biletvsem_access.log;
    error_log  /var/log/nginx/biletvsem_error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript
               image/svg+xml application/xml;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 32m;

    # API + WebSocket
    location /api/ {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /sitemap.xml {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /feed/services.yml {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(llms\.txt|llms-full\.txt)$ {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /.well-known/llms.txt {
        proxy_pass http://biletvsem_node;
    }

    # Статика Vite (root, не alias — иначе try_files + alias часто даёт 404)
    location /assets/ {
        root /var/pokupka-biletov/frontend/dist;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /robots.txt {
        alias /var/pokupka-biletov/frontend/dist/robots.txt;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # Всегда через Node: seoRenderer отдаёт dist/manifest.json (нет 404, если путь к dist на диске отличается)
    location = /manifest.json {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.svg {
        alias /var/pokupka-biletov/frontend/dist/favicon.svg;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /loading.gif {
        alias /var/pokupka-biletov/frontend/dist/loading.gif;
        add_header Content-Type "image/gif";
        add_header Cache-Control "public, max-age=86400";
    }

    # Service Worker: без долгого кэша
    location = /sw.js {
        alias /var/pokupka-biletov/frontend/dist/sw.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Раскомментируй, если хочешь отдавать /legacy/ с диска
    # location /legacy/ {
    #     alias /var/pokupka-biletov/frontend/dist/legacy/;
    #     add_header Cache-Control "public, max-age=31536000, immutable";
    # }

    location /uploads/ {
        proxy_pass http://biletvsem_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://biletvsem_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
