# Вставить в server { } для prime-coder.ru — ДО location / с try_files или SPA fallback.
# Иначе /sitemap.xml попадает в index.html (~10KB HTML вместо XML).

location = /sitemap.xml {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=3600";
}

location = /feed/services.yml {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=3600";
}

location ~ ^/(llms\.txt|llms-full\.txt)$ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=3600";
}

# Если PORT в .env не 4000 — замени 4000 в proxy_pass (проверка: curl -sI http://127.0.0.1:ПОРТ/sitemap.xml)
