name: Uptime — biletvsem.com

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Homepage must return 200 with SPA bundle
        run: |
          set -euo pipefail
          URL="https://biletvsem.com/"
          CODE=$(curl -sf -o /tmp/home.html -w '%{http_code}' "$URL" || echo "000")
          if [ "$CODE" != "200" ]; then
            echo "❌ $URL → HTTP $CODE (expected 200)"
            exit 1
          fi
          if grep -q '%PUBLIC_URL%' /tmp/home.html; then
            echo "❌ index.html contains %PUBLIC_URL% (broken CRA template)"
            exit 1
          fi
          if ! grep -qE '/assets/js/.+\.js' /tmp/home.html; then
            echo "❌ index.html has no /assets/js/*.js — SPA will not load"
            head -c 500 /tmp/home.html
            exit 1
          fi
          echo "✅ $URL — 200, assets/js present"
