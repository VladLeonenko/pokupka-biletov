# Заготовка CI/CD: линт, сборка, опционально деплой.
# Добавьте секреты в Settings → Secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PRIVATE_KEY (или используйте rsync over SSH).
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        id: build-frontend
        run: cd frontend && npm run build
        env:
          # На проде при другом домене бэка задать VITE_API_URL
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}

      - name: Verify dist (no CRA / broken SPA)
        run: |
          set -euo pipefail
          if [ -f frontend/public/index.html ]; then
            echo "❌ frontend/public/index.html must not exist (Vite overwrites dist/index.html)"
            exit 1
          fi
          if grep -q '%PUBLIC_URL%' frontend/dist/index.html; then
            echo "❌ dist/index.html contains %PUBLIC_URL%"
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.js' frontend/dist/index.html; then
            echo "❌ dist/index.html has no /assets/*.js"
            exit 1
          fi
          echo "✅ dist/index.html OK"

      - name: Install backend deps
        run: cd backend && npm ci

      # Раскомментировать при появлении тестов:
      # - name: Run tests
      #   run: npm run test

  # Деплой — раскомментировать и настроить секреты (DEPLOY_HOST, DEPLOY_USER, SSH_PRIVATE_KEY)
