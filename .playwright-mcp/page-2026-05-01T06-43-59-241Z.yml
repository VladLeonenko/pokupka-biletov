    - generic [ref=e509]:
      - generic [ref=e510]:
        - heading "Матч Спартак - ЦСКА. Финал Кубка России. Путь регионов" [level=2] [ref=e511]
        - generic [ref=e512]:
          - generic [ref=e514]:
            - heading "Матч главного московского футбольного дерби" [level=3] [ref=e515]
            - paragraph [ref=e516]: Спортивный комплекс «Лукойл-Арена», г. Москва
            - paragraph [ref=e517]: ФК Спартак
            - paragraph [ref=e518]: "Игроки: Роман Зобнин, Наиль Умяров, Александр Макименко и другие"
            - paragraph [ref=e519]: "Тренер: Хуан Карлос Карседо"
            - paragraph [ref=e520]: ФК ЦСКА
            - paragraph [ref=e521]: "Игроки: Игорь Акинфеев, Милан Гайич, Артем Бандикян и другие"
            - paragraph [ref=e522]: "Тренер: Фабио Челестини"
          - generic [ref=e523]:
            - generic [ref=e525]:
              - paragraph [ref=e526]: Появившись в 1922 году, противостояние «Спартака» и ЦСКА навсегда разделило московских болельщиков футбола на два лагеря. За эти годы команды сыграли больше 200 матчей и один из них, 6 мая 2026 года мы увидим на поле «Лукойл Арены». Статистика побед в главном московском дерби на стороне «красно-белых». У них 80 побед против 75, которые удалось завоевать «армейцам». Ну и ровно 40 игр непримиримые соперники завершили ничьей.
              - paragraph [ref=e527]: Предыдущий совместный матч команды сыграли в ноябре 2025-го. Тогда с победой с поля ушли спартаковцы, правда, вырвать ее они смогли, забив соперникам всего лишь один гол. Надо ли говорить, насколько футболисты ЦСКА замотивированы на победу, тем более что играть им предстоит на домашнем поле соперников.
              - paragraph [ref=e528]: Не меньше на результативную и победную игру настроены и хозяева. Они точно не откажутся закрепить прошлый успех и пополнить свою копилку новой победой. Остроты главному московскому дерби придает и тот факт, что играть команды будут не штатную игру сезона, а в финале Пути регионов Кубка России. Так что на трибунах «Лукойл Арены» будет просто невероятная атмосфера, а на поле - игра, которую точно стоит увидеть вживую, а не в формате трансляции.
              - paragraph [ref=e529]: Эти команды уже дважды играли друг с другом в финале Кубка России, в 1994-м и в 2006-м году. Этом году это будет финальная битва «20 лет спустя». Не пропустите это событие, его стоит увидеть даже тем, кто не считает себя самым преданным футбольным болельщикам. В этот майский вечер трибуны «Лукойл Арены» ждут вас!
              - heading "Билеты на матч «Спартак» - ЦСКА в Москве" [level=2] [ref=e530]
              - paragraph [ref=e531]: Онлайн-сервис покупки и продажи билетов Portalbilet поможет вам с посещением самых ожидаемых спортивных событий сезона. С нами вам не придется ехать в кассу стадиона, чтобы достать билеты на игру любимой команды. Это вы сможете сделать у нас на сайте, заказав билет онлайн и оформив его покупку всего за 2-3 минуты.
              - paragraph [ref=e532]: На нашем сайте вы можете купить билеты на матч «Спартак» - ЦСКА в Москве. Спешите занять места на трибунах стадиона, пока свободные еще есть у нас в наличии!
